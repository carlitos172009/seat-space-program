<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theatre Seat Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
  <h1 class="text-2xl font-bold mb-4">🎭 Don Bosco Theatre</h1>

  <!-- Seat Grid -->
  <div id="seatGrid" class="grid grid-cols-6 gap-2 mb-6"></div>

  <!-- Buy Button -->
  <button id="buyBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 mb-6">
    Confirm Purchase
  </button>

  <!-- Cart -->
  <div>
    <h2 class="text-lg font-semibold mb-2">🛒 Cart</h2>
    <div id="cartContainer"></div>
    <p id="totalPrice" class="font-bold mt-2">$0</p>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 🔴 ADD YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const EVENT_ID = "event1";
  window.db = db;
  window.EVENT_ID = EVENT_ID;
  window.firebaseReady = true;
</script>

<script>
  const rows = 5;
  const cols = 6;
  const seatGrid = document.getElementById("seatGrid");
  const cartContainer = document.getElementById("cartContainer");
  const totalPriceText = document.getElementById("totalPrice");

  let selectedSeats = [];
  let occupiedSeats = [];

  function seatId(row, col) {
    return String.fromCharCode(65 + row) + (col + 1);
  }

  async function loadSeats() {
    if (!window.firebaseReady || !window.db) {
      occupiedSeats = [];
      renderSeats();
      return;
    }

    const { db, EVENT_ID } = window;

    try {
      const docRef = doc(db, "events", EVENT_ID);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        const today = new Date();
        const eventDate = new Date(data.date);

        // ✅ Auto reset after event
        if (today > eventDate) {
          occupiedSeats = [];
        } else {
          occupiedSeats = (data.seats || []).map(s => s.id);
        }

      } else {
        // create event if not exists
        await setDoc(doc(db, "events", EVENT_ID), { date: "2026-04-01", seats: [] });
        occupiedSeats = [];
      }

      renderSeats();
    } catch (err) {
      console.error("Error loading seats:", err);
      occupiedSeats = [];
      renderSeats();
    }
  }

  function renderSeats() {
    seatGrid.innerHTML = "";

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const id = seatId(r, c);
        const seat = document.createElement("div");
        seat.textContent = id;
        seat.className = "p-3 text-center rounded cursor-pointer";

        if (occupiedSeats.includes(id)) seat.classList.add("bg-red-400", "cursor-not-allowed");
        else if (selectedSeats.find(s => s.id === id)) seat.classList.add("bg-green-400");
        else seat.classList.add("bg-gray-300");

        seat.addEventListener("click", () => {
          if (occupiedSeats.includes(id)) return;

          const existing = selectedSeats.find(s => s.id === id);
          if (existing) selectedSeats = selectedSeats.filter(s => s.id !== id);
          else selectedSeats.push({ id: id, type: "adult" });

          renderSeats();
          renderCart();
        });

        seatGrid.appendChild(seat);
      }
    }
  }

  function renderCart() {
    cartContainer.innerHTML = "";
    if (selectedSeats.length === 0) {
      cartContainer.innerHTML = "<p>No seats selected</p>";
      totalPriceText.textContent = "$0";
      return;
    }

    let total = 0;

    selectedSeats.forEach((seat, index) => {
      const price = seat.type === "adult" ? 10 : 5;
      total += price;

      const row = document.createElement("div");
      row.className = "flex justify-between items-center mb-2";

      row.innerHTML = `
        <span>${seat.id}</span>
        <select data-index="${index}" class="border p-1 rounded">
          <option value="adult" ${seat.type === "adult" ? "selected" : ""}>Adult ($10)</option>
          <option value="child" ${seat.type === "child" ? "selected" : ""}>Child ($5)</option>
        </select>
        <span>$${price}</span>
      `;
      cartContainer.appendChild(row);
    });

    totalPriceText.textContent = "Total: $" + total;

    document.querySelectorAll("select").forEach(select => {
      select.addEventListener("change", e => {
        const index = e.target.dataset.index;
        selectedSeats[index].type = e.target.value;
        renderCart();
      });
    });
  }

  async function savePurchase() {
    if (!window.db) return;

    const { db, EVENT_ID } = window;
    try {
      const docRef = doc(db, "events", EVENT_ID);
      const docSnap = await getDoc(docRef);

      let existingSeats = [];
      if (docSnap.exists()) existingSeats = docSnap.data().seats || [];

      const updatedSeats = [...existingSeats, ...selectedSeats];
      await setDoc(docRef, { date: "2026-04-01", seats: updatedSeats });
    } catch (err) {
      console.error("Error saving:", err);
    }
  }

  document.getElementById("buyBtn").addEventListener("click", async () => {
    if (selectedSeats.length === 0) return alert("Select at least one seat!");

    await savePurchase();

    alert("Purchase successful!");

    selectedSeats = [];
    await loadSeats();
    renderCart();
  });

  // INIT
  loadSeats();
  renderCart();
</script>

</body>
</html>
