<script>
  const rows = 5;
  const cols = 6;

  const seatGrid = document.getElementById("seatGrid");
  const selectedSeatsText = document.getElementById("selectedSeats");
  const totalPriceText = document.getElementById("totalPrice");
  const ticketTypeSelect = document.getElementById("ticketType");

  // ✅ Now stores objects instead of strings
  let selectedSeats = [];

  // 🔴 MOCK occupied seats
  let occupiedSeats = ["A1", "B3", "C2"];

  function seatId(row, col) {
    return String.fromCharCode(65 + row) + (col + 1);
  }

  function renderSeats() {
    seatGrid.innerHTML = "";

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const id = seatId(r, c);
        const seat = document.createElement("div");

        seat.textContent = id;
        seat.className = "p-3 text-center rounded cursor-pointer";

        if (occupiedSeats.includes(id)) {
          seat.classList.add("bg-red-400", "cursor-not-allowed");
        } else if (selectedSeats.find(s => s.id === id)) {
          seat.classList.add("bg-green-400");
        } else {
          seat.classList.add("bg-gray-300");
        }

        seat.addEventListener("click", () => {
          if (occupiedSeats.includes(id)) return;

          const existing = selectedSeats.find(s => s.id === id);

          if (existing) {
            // remove seat
            selectedSeats = selectedSeats.filter(s => s.id !== id);
          } else {
            // ✅ store seat WITH type
            selectedSeats.push({
              id: id,
              type: ticketTypeSelect.value
            });
          }

          console.log("Selected seats:", selectedSeats);

          renderSeats();
          updateCart();
        });

        seatGrid.appendChild(seat);
      }
    }
  }

  function updateCart() {
    if (selectedSeats.length === 0) {
      selectedSeatsText.textContent = "No seats selected";
      totalPriceText.textContent = "$0";
      return;
    }

    let total = 0;

    selectedSeats.forEach(seat => {
      total += seat.type === "adult" ? 10 : 5;
    });

    selectedSeatsText.textContent =
      "Seats: " +
      selectedSeats.map(s => `${s.id} (${s.type})`).join(", ");

    totalPriceText.textContent = "Total: $" + total;
  }

  document.getElementById("buyBtn").addEventListener("click", () => {
    if (selectedSeats.length === 0) {
      alert("Select at least one seat!");
      return;
    }

    console.log("PURCHASE DATA:", selectedSeats);

    // ✅ Move selected seats into occupied
    selectedSeats.forEach(seat => {
      occupiedSeats.push(seat.id);
    });

    alert("Purchase successful!");

    // Reset
    selectedSeats = [];
    renderSeats();
    updateCart();
  });

  renderSeats();
</script>
